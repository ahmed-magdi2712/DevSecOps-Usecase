# Trivy secret scanning configuration
# Defines which secret patterns to skip or add

# Enable all default rules
enable-builtin-rules: true

# Custom rules for this project
rules:
  - id: app-secret-key
    category: AppConfig
    title: Application secret key
    severity: CRITICAL
    regex: "SECRET_KEY\s*=\s*['\"]?[A-Za-z0-9+/=]{32,}"
    keywords:
      - SECRET_KEY

# Patterns to skip (known false positives)
skip-patterns:
  - "CHANGE_ME"
  - "your-.*-here"
  - "example"
  - "placeholder"
