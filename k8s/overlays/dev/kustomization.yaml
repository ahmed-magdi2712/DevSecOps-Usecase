apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: secureapp-dev

resources:
- ../../base

namePrefix: dev-

patches:
- patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: app
    spec:
      replicas: 1
      template:
        spec:
          containers:
            - name: api
              resources:
                requests:
                  cpu: "50m"
                  memory: "128Mi"
                limits:
                  cpu: "200m"
                  memory: "256Mi"
              env:
                - name: ENVIRONMENT
                  value: "development"
                - name: LOG_LEVEL
                  value: "debug"

configMapGenerator:
- behavior: merge
  literals:
  - ENVIRONMENT=development
  - LOG_LEVEL=debug
  - WORKERS=1
  name: secureapp-config
images:
- digest: sha256:68ac0d667dd1450b7ff43ddee09adfe4deb8a6b69ad0b1abbede04dad68f5352
  name: ahmed-magdi2712/DevSecOps-Usecase
  newName: ghcr.io/ahmed-magdi2712/devsecops-usecase
