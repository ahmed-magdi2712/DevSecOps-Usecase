---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-image-digest
  annotations:
    policies.kyverno.io/title: Require Image Digest
    policies.kyverno.io/description: >
      Ensures that all deployed images use immutable digests instead of tags.
    pod-policies.kyverno.io/autogen-controllers: "Deployment,DaemonSet,Job,CronJob"
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: require-digest-tag
      match:
        any:
          - resources:
              kinds:
                - Deployment
                - StatefulSet
                - DaemonSet
                - Job
                - CronJob
      preconditions:
        any:
          - key: "{{ request.operation }}"
            operator: In
            value: ["CREATE", "UPDATE"]
      validate:
        message: "Image must use immutable digest (sha256:) instead of mutable tag"
        deny:
          conditions:
            all:
              - key: "{{ request.object.spec.template.spec.containers[].image | contains(':') }}"
                operator: Equal
                value: "true"
              - key: "{{ request.object.spec.template.spec.containers[].image | contains('@sha256') }}"
                operator: Equal
                value: "false"
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: enforce-trusted-images-production
  annotations:
    policies.kyverno.io/title: Enforce Trusted Images for Production
    policies.kyverno.io/description: >
      Production-specific policy that requires multiple verification checks.
spec:
  validationFailureAction: Enforce
  background: true
  match:
    any:
      - resources:
          namespaces:
            - secureapp-prod
  rules:
    - name: require-cosign-attestation
      match:
        any:
          - resources:
              kinds:
                - Deployment
                - StatefulSet
                - DaemonSet
      preconditions:
        any:
          - key: "{{ request.operation }}"
            operator: In
            value: ["CREATE", "UPDATE"]
      verifyImages:
        - imageReferences:
            - "ghcr.io/secureapp/*"
          attestations:
            - type: cosign
              predicateType: cosign.sigstore.dev/v1
              conditions:
                - key: "{{ body.predicateType }}"
                  operator: Equal
                  value: "cosign.sigstore.dev/v1"
          skipBackgroundRequests: true
    - name: require-source-check
      match:
        any:
          - resources:
              kinds:
                - Deployment
      preconditions:
        any:
          - key: "{{ request.operation }}"
            operator: In
            value: ["CREATE", "UPDATE"]
      mutate:
        patchStrategicMerge:
          metadata:
            labels:
              "{{ `image.verified` }}": "true"
          spec:
            template:
              metadata:
                annotations:
                  cosign.verified: "{{ request.object.spec.template.spec.containers[].image }}"
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: image-verification-summary
  annotations:
    policies.kyverno.io/title: Image Verification Summary
    policies.kyverno.io/description: >
      Reports summary of image verification status for all namespaces.
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: report-image-verification
      match:
        any:
          - resources:
              kinds:
                - Deployment
                - StatefulSet
                - DaemonSet
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kube-public
      preconditions:
        any:
          - key: "{{ request.operation }}"
            operator: In
            value: ["CREATE", "UPDATE"]
      mutate:
        patchStrategicMerge:
          metadata:
            annotations:
              kyverno.io/image-verified: "true"
