---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - signed-images-policy.yaml
  - additional-policies.yaml

commonLabels:
  app.kubernetes.io/part-of: kyverno-policies
  app.kubernetes.io/managed-by: kustomize

namespace: kyverno

configMapGenerator:
  - name: kyverno-policy-config
    literals:
      - trusted_registries=ghcr.io,docker.io,internal.registry.company.com
      - cosign_issuer=https://token.actions.githubusercontent.com
