---
# Secrets are base64-encoded placeholders — replace with Sealed Secrets or ESO in production
apiVersion: v1
kind: Secret
metadata:
  name: secureapp-secrets
  labels:
    app.kubernetes.io/name: secureapp
type: Opaque
stringData:
  DATABASE_URL: "postgresql://app_user:CHANGE_ME@postgres:5432/app_db"
  REDIS_URL: "redis://redis:6379/0"
  SECRET_KEY: "CHANGE_ME_USE_A_LONG_RANDOM_STRING_AT_LEAST_32_CHARS"
