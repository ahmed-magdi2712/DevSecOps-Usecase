---
apiVersion: v1
kind: ConfigMap
metadata:
  name: secureapp-config
  labels:
    app.kubernetes.io/name: secureapp
data:
  ENVIRONMENT: "production"
  LOG_LEVEL: "info"
  WORKERS: "2"
  PORT: "8000"
  DB_POOL_SIZE: "5"
  DB_MAX_OVERFLOW: "10"
  CACHE_TTL: "300"
  RATE_LIMIT_REQUESTS: "100"
  RATE_LIMIT_WINDOW: "60"
  ENABLE_METRICS: "true"
