---
# ==============================================================================
# Template: Build & SBOM
# ==============================================================================
# Builds and pushes Docker images with:
#   - Docker Buildx with BuildKit
#   - SHA-based image tags
#   - GitHub Container Registry push
#   - SBOM generation (SPDX, CycloneDX)
#   - Dotenv artifact for downstream jobs (image tag + digest)
#
# Prerequisites — Set these GitLab CI/CD variables:
#   GHCR_USERNAME: GitHub username for registry auth
#   GHCR_PASSWORD: (masked) GitHub token with packages:write
#
# Usage:
#   include:
#     - project: 'ahmed-magdi2712/DevSecOps-Usecase'
#       file: '/gitlab_ci/templates/build.yml'
#       ref: main
# ==============================================================================

build:
  stage: build
  image: docker:27-cli
  services:
    - name: docker:27-dind
      alias: docker
  interruptible: true
  needs: [test]
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    DOCKER_BUILDKIT: "1"
    BUILDX_VERSION: "0.18.0"

  # Run only on main or release/* branches — equivalent of GitHub: if:
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH || $CI_COMMIT_BRANCH =~ /^release\//'
    - when: never

  before_script:
    # Install syft for SBOM generation
    - apk add --no-cache curl
    - curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

    # Install buildx plugin
    - mkdir -p ~/.docker/cli-plugins
    - |
      BUILDX_URL="https://github.com/docker/buildx/releases/download/v${BUILDX_VERSION}/buildx-v${BUILDX_VERSION}.linux-amd64"
      wget -q "${BUILDX_URL}" -O ~/.docker/cli-plugins/docker-buildx
    - chmod +x ~/.docker/cli-plugins/docker-buildx

    # Login to GitHub Container Registry
    - echo "${GHCR_PASSWORD}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin

  script:
    - echo "=== Generate Image Tags ==="
    # Generate SHA-based tag (equivalent to docker/metadata-action)
    - SHORT_SHA="${CI_COMMIT_SHORT_SHA}"
    - IMAGE_TAG="${REGISTRY}/${IMAGE_NAME}:sha-${SHORT_SHA}"
    - IMAGE_TAG_LOWER=$(echo "${IMAGE_TAG}" | tr '[:upper:]' '[:lower:]')
    - echo "Image: ${IMAGE_TAG_LOWER}"

    - echo "=== Set up Docker Buildx ==="
    - docker buildx create --use --name multi-builder --driver docker-container --bootstrap

    - echo "=== Build and Push Docker Image ==="
    - |
      BUILD_OUTPUT=$(docker buildx build \
        --builder multi-builder \
        --file docker/Dockerfile \
        --tag "${IMAGE_TAG_LOWER}" \
        --label "org.opencontainers.image.created=${CI_COMMIT_TIMESTAMP}" \
        --label "org.opencontainers.image.revision=${CI_COMMIT_SHA}" \
        --label "org.opencontainers.image.version=${SHORT_SHA}" \
        --build-arg "BUILD_DATE=${CI_COMMIT_TIMESTAMP}" \
        --build-arg "VCS_REF=${CI_COMMIT_SHA}" \
        --build-arg "VERSION=${SHORT_SHA}" \
        --push \
        --sbom=true \
        . 2>&1 | tee /tmp/build-output.txt)

    # Extract image digest from build output
    - IMAGE_DIGEST=$(grep -oP 'digest: \K(sha256:[a-f0-9]+)' /tmp/build-output.txt || echo "")
    - |
      if [ -z "$IMAGE_DIGEST" ]; then
        # Fallback: get digest from registry
        IMAGE_DIGEST=$(docker buildx imagetools inspect "${IMAGE_TAG_LOWER}" --format '{{.Manifest.Digest}}')
      fi
    - echo "Digest: ${IMAGE_DIGEST}"

    - echo "=== Generate SBOM with Syft ==="
    - syft "${IMAGE_TAG_LOWER}" -o spdx-json > sbom.spdx.json
    - syft "${IMAGE_TAG_LOWER}" -o cyclonedx-json > sbom.cyclonedx.json
    - syft "${IMAGE_TAG_LOWER}" -o template -t csv.tmpl > sbom.txt

    - echo "=== Generate Build Summary ==="
    - |
      echo ""
      echo "============================================"
      echo "  Build Summary"
      echo "============================================"
      echo "  Image:  ${IMAGE_TAG_LOWER}"
      echo "  Digest: ${IMAGE_DIGEST}"
      echo "  SBOM:   sbom.spdx.json"
      echo "============================================"

    # Write outputs to dotenv file for downstream jobs
    - echo "IMAGE_TAG=${IMAGE_TAG_LOWER}" >> build.env
    - echo "IMAGE_DIGEST=${IMAGE_DIGEST}" >> build.env
    - echo "IMAGE_NAME_LOWER=$(echo ${IMAGE_NAME} | tr '[:upper:]' '[:lower:]')" >> build.env

  artifacts:
    paths:
      - sbom.spdx.json
      - sbom.cyclonedx.json
      - sbom.txt
    reports:
      dotenv: build.env
    expire_in: 90 days
