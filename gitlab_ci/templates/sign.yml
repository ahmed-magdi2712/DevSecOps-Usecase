---
# ==============================================================================
# Template: Sign Image
# ==============================================================================
# Signs container images and SBOMs using Cosign with:
#   - Private key-based signing
#   - SBOM attachment and signing
#   - Signature verification
#   - SBOM attachment verification
#
# Prerequisites — Set these GitLab CI/CD variables:
#   COSIGN_PRIVATE_KEY: (file type, masked) Cosign private key
#   COSIGN_PASSWORD: (masked) Password for the Cosign private key
#   COSIGN_PUBLIC_KEY: Cosign public key for verification
#   GHCR_USERNAME: GitHub username
#   GHCR_PASSWORD: (masked) GitHub token with packages:write
#
# Usage:
#   include:
#     - project: 'ahmed-magdi2712/DevSecOps-Usecase'
#       file: '/gitlab_ci/templates/sign.yml'
#       ref: main
# ==============================================================================

sign:
  stage: sign
  image: docker:27-cli
  services:
    - name: docker:27-dind
      alias: docker
  interruptible: true
  needs: [scan, build]
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    COSIGN_VERSION: "2.2.4"

  # Run only on main or release/* branches
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH || $CI_COMMIT_BRANCH =~ /^release\//'
    - when: never

  before_script:
    # Install Cosign
    - apk add --no-cache curl
    - |
      wget -q "https://github.com/sigstore/cosign/releases/download/v${COSIGN_VERSION}/cosign-linux-amd64" \
        -O /usr/local/bin/cosign
    - chmod +x /usr/local/bin/cosign
    - cosign version

    # Login to GitHub Container Registry
    - echo "${GHCR_PASSWORD}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin

  script:
    - echo "=== Normalize image name ==="
    - IMAGE_NAME_LOWER=$(echo "${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')
    - IMAGE_REF="${REGISTRY}/${IMAGE_NAME_LOWER}@${IMAGE_DIGEST}"
    - echo "Image ref: ${IMAGE_REF}"

    - echo "=== Sign with Private Key ==="
    - |
      cosign sign \
        --key env://COSIGN_PRIVATE_KEY \
        --annotations "repo=${CI_PROJECT_URL}" \
        --annotations "sha=${CI_COMMIT_SHA}" \
        --annotations "ref=${CI_COMMIT_BRANCH}" \
        --annotations "actor=${GITLAB_USER_LOGIN}" \
        --annotations "pipeline_id=${CI_PIPELINE_ID}" \
        --annotations "job_id=${CI_JOB_ID}" \
        --yes \
        "${IMAGE_REF}"
    - echo "Image signed successfully"

    - echo "=== Attach and Sign SBOM ==="
    - |
      cosign attach sbom \
        --sbom sbom/sbom.spdx.json \
        "${IMAGE_REF}"

      cosign sign --yes \
        --attachment sbom \
        "${IMAGE_REF}"
    - echo "SBOM attached and signed successfully"

    - echo "=== Verify Signature ==="
    - |
      cosign verify \
        --key env://COSIGN_PUBLIC_KEY \
        "${IMAGE_REF}"
    - echo "Signature verified successfully"

    - echo "=== Verify SBOM Attachment ==="
    - |
      cosign download sbom \
        "${IMAGE_REF}"
    - echo "SBOM attachment verified successfully"

    - echo "=== Signing Summary ==="
    - |
      echo ""
      echo "============================================"
      echo "  Image Signing Summary"
      echo "============================================"
      echo "  Key Signature:    Signed"
      echo "  SBOM Attachment:  Attached & Signed"
      echo "  Image:            ${IMAGE_REF}"
      echo "============================================"
