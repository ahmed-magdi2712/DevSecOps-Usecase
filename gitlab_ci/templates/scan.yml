---
# ==============================================================================
# Template: Image Scan
# ==============================================================================
# Scans container images for vulnerabilities, secrets, and misconfigurations:
#   - Trivy Vulnerability Scanner (OS & library)
#   - Trivy Config Scanner (Kubernetes manifests)
#   - Trivy Secret Scanner
#
# Usage:
#   include:
#     - project: 'ahmed-magdi2712/DevSecOps-Usecase'
#       file: '/gitlab_ci/templates/scan.yml'
#       ref: main
# ==============================================================================

scan:
  stage: scan
  image: docker:27-cli
  services:
    - name: docker:27-dind
      alias: docker
  interruptible: true
  needs: [build]
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    TRIVY_VERSION: "0.56.2"

  before_script:
    # Install Trivy
    - apk add --no-cache curl
    - |
      TRIVY_URL="https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
      wget -q "${TRIVY_URL}" -O /tmp/trivy.tar.gz
    - tar zxf /tmp/trivy.tar.gz -C /usr/local/bin/ trivy
    - trivy --version

    # Login to registry (need to pull the image for scanning)
    - echo "${GHCR_PASSWORD}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin

    # Download SBOM artifacts from build stage
    # (dotenv variables from build are auto-loaded by GitLab)

  script:
    - echo "=== Trivy Vulnerability Scanner ==="
    - |
      trivy image \
        --severity CRITICAL,HIGH \
        --exit-code 1 \
        --ignore-unfixed \
        --vuln-type os,library \
        --scanners vuln,secret,misconfig \
        --trivyignores .trivyignore \
        --timeout 10m \
        --format sarif \
        --output trivy-results.sarif \
        "${IMAGE_TAG}"

    - echo "=== Trivy Config Scanner ==="
    - |
      trivy config \
        --severity CRITICAL,HIGH \
        --trivyignores .trivyignore \
        --exit-code 1 \
        --format table \
        --output trivy-config-results.txt \
        k8s/

    - echo "=== Trivy Secret Scanner ==="
    - |
      trivy image \
        --scanners secret \
        --exit-code 1 \
        --format json \
        --output trivy-secrets.json \
        "${IMAGE_TAG}"

    - echo "=== Scan Summary ==="
    - |
      echo ""
      echo "============================================"
      echo "  Trivy Scan Results"
      echo "============================================"
      if [ -f "trivy-config-results.txt" ]; then
        cat trivy-config-results.txt
      fi
      echo "============================================"

  artifacts:
    paths:
      - trivy-results.sarif
      - trivy-config-results.txt
      - trivy-secrets.json
    expire_in: 90 days
    when: always
