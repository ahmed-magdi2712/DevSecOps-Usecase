---
# ==============================================================================
# GitLab CI: DevSecOps Pipeline (Main Orchestrator)
# ==============================================================================
# This is the main pipeline definition. It includes reusable templates for each
# stage and defines the overall workflow rules, variables, and stage ordering.
#
# Cross-repo usage:
#   include:
#     - project: 'ahmed-magdi2712/DevSecOps-Usecase'
#       file: '/gitlab_ci/.gitlab-ci.yml'
#       ref: main
# ==============================================================================

# ---------------------------------------------------------------------------
# Workflow Rules — determines when the pipeline runs
# Equivalent of GitHub: push branches, pull_request, workflow_dispatch
# ---------------------------------------------------------------------------
workflow:
  rules:
    # Push to main, develop, or release/*
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH =~ /^(main|develop|release\/.*)$/'
    # Merge request targeting main
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"'
    # Manual trigger (equivalent to workflow_dispatch)
    - if: '$CI_PIPELINE_SOURCE == "web"'
    # Scheduled pipelines
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    # Default: don't run for other cases
    - when: never

# ---------------------------------------------------------------------------
# Global Variables
# Equivalent of GitHub: env: block
# ---------------------------------------------------------------------------
variables:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${CI_PROJECT_PATH}
  COSIGN_EXPERIMENTAL: "true"
  SYFT_FORMAT: spdx-json
  APP_NAME: secureapp-dev
  SONAR_HOST_URL: https://sonarcloud.io

  # Docker-in-Docker configuration
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""
  DOCKER_DRIVER: overlay2
  DOCKER_BUILDKIT: "1"

  # Git strategy
  GIT_DEPTH: "0"
  GIT_STRATEGY: clone

# ---------------------------------------------------------------------------
# Pipeline Stages (in order)
# ---------------------------------------------------------------------------
stages:
  - lint
  - test
  - sonarqube
  - build
  - scan
  - sign
  - deploy
  - security-summary

# ---------------------------------------------------------------------------
# Cancel in-progress runs for the same branch
# Equivalent of GitHub: concurrency.cancel-in-progress
# ---------------------------------------------------------------------------
interruptible: true

# ---------------------------------------------------------------------------
# Template Includes — modular reusable workflows
# Each template can be used independently by other repos via:
#   include:
#     - project: 'ahmed-magdi2712/DevSecOps-Usecase'
#       file: '/gitlab_ci/templates/<name>.yml'
#       ref: main
# ---------------------------------------------------------------------------
include:
  - local: gitlab_ci/templates/lint.yml
  - local: gitlab_ci/templates/test.yml
  - local: gitlab_ci/templates/sonarqube.yml
  - local: gitlab_ci/templates/build.yml
  - local: gitlab_ci/templates/scan.yml
  - local: gitlab_ci/templates/sign.yml
  - local: gitlab_ci/templates/deploy.yml
  - local: gitlab_ci/templates/security-summary.yml
